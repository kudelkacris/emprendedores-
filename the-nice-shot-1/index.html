<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Nice Shot — Decants & Perfumes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 20px;
      background: radial-gradient(ellipse at top, #1a1a1a, #0a0a0a);
    }

    .hero-logo {
      width: 200px;
      height: 200px;
      margin-bottom: 16px;
    }

    .hero-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      -webkit-mask-image: radial-gradient(ellipse 75% 75% at center, black 55%, transparent 100%);
      mask-image: radial-gradient(ellipse 75% 75% at center, black 55%, transparent 100%);
    }

    .hero-tagline {
      font-size: 0.9rem;
      color: #c9a84c;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero-title {
      font-size: 1.1rem;
      color: #888;
      text-align: center;
    }

    .ig-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c9a84c;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 2px;
      margin-top: 14px;
      padding: 8px 18px;
      border: 1px solid #c9a84c33;
      border-radius: 50px;
      transition: background 0.2s;
    }

    .ig-link:hover { background: #c9a84c22; }

    /* CATALOG */
    .catalog-section {
      padding: 30px 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .catalog-section h2 {
      text-align: center;
      font-size: 1rem;
      letter-spacing: 4px;
      color: #c9a84c;
      text-transform: uppercase;
      margin-bottom: 24px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 12px;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .product-card:hover { border-color: #c9a84c; transform: translateY(-2px); }

    .product-img-wrap {
      width: 100%;
      height: 300px;
      background: #1a1a1a;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
      transition: transform 0.3s;
    }

    .product-img-wrap:hover img { transform: scale(1.05); }

    .product-img-wrap .lupa {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(201,168,76,0.85);
      color: #000;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .product-img-wrap:hover .lupa { opacity: 1; }

    .product-info { padding: 14px; }

    .product-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .product-brand {
      font-size: 0.75rem;
      color: #c9a84c;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .ml-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .ml-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    .ml-btn:hover, .ml-btn.selected {
      background: #c9a84c;
      border-color: #c9a84c;
      color: #000;
      font-weight: 700;
    }

    .product-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: #c9a84c;
      margin-bottom: 12px;
    }

    .add-btn {
      width: 100%;
      background: #c9a84c;
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.15s;
    }

    .add-btn:hover { background: #e0bb5e; }
    .add-btn:active { transform: scale(0.98); }

    /* CART FAB */
    .cart-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #c9a84c;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 14px 22px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      box-shadow: 0 4px 20px rgba(201,168,76,0.4);
      z-index: 100;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .cart-fab.visible { display: flex; }

    .cart-count {
      background: #000;
      color: #c9a84c;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 900;
    }

    /* WPP FAB */
    .wpp-fab {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: #25D366;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      z-index: 100;
      transition: transform 0.15s;
    }

    .wpp-fab:hover { transform: scale(1.1); }

    /* MODALES */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #111;
      border-top: 2px solid #c9a84c;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .close-btn {
      background: #222;
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
    }

    /* MODAL DETALLE */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .detail-overlay.open { display: flex; }

    .detail-modal {
      background: #111;
      border: 1px solid #c9a84c44;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .detail-img {
      width: 100%;
      height: 280px;
      object-fit: contain;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 16px 16px 0 0;
    }

    .detail-body { padding: 20px; }

    .detail-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .detail-brand {
      font-size: 0.8rem;
      color: #c9a84c;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 4px 0 16px;
    }

    .detail-desc {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.7;
      margin-bottom: 20px;
      border-left: 2px solid #c9a84c44;
      padding-left: 14px;
    }

    .detail-notas {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .nota-tag {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #c9a84c;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 50px;
      letter-spacing: 1px;
    }

    .detail-precios {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .detail-precio-item {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .detail-precio-item:hover, .detail-precio-item.selected {
      border-color: #c9a84c;
      background: #c9a84c11;
    }

    .detail-precio-ml {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 4px;
    }

    .detail-precio-val {
      font-size: 1rem;
      font-weight: 700;
      color: #c9a84c;
    }

    .detail-add-btn {
      width: 100%;
      background: #c9a84c;
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .detail-add-btn:hover { background: #e0bb5e; }

    .detail-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      z-index: 1;
    }

    /* CART ITEMS */
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #222;
      gap: 12px;
    }

    .cart-item-info { flex: 1; }

    .cart-item-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
    }

    .cart-item-detail {
      font-size: 0.75rem;
      color: #888;
      margin-top: 2px;
    }

    .cart-item-price {
      font-weight: 700;
      color: #c9a84c;
      white-space: nowrap;
    }

    .cart-item-remove {
      background: none;
      border: 1px solid #333;
      color: #666;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .cart-item-remove:hover { border-color: #ff4444; color: #ff4444; }

    .cart-total {
      display: flex;
      justify-content: space-between;
      padding: 16px 0 20px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .cart-total span:last-child { color: #c9a84c; }

    /* FORMULARIO */
    .form-section {
      border-top: 1px solid #222;
      padding-top: 20px;
    }

    .form-section h3 {
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: #c9a84c;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus { border-color: #c9a84c; }

    .send-btn {
      width: 100%;
      background: #25D366;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .send-btn:hover { background: #1fb858; }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #444;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    footer a { color: #c9a84c; text-decoration: none; }

    @media (max-width: 480px) {
      .catalog-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .product-info { padding: 10px; }
      .product-name { font-size: 0.8rem; }
      .product-img-wrap { height: 200px; }
    }
  </style>
</head>

      desc: "Amor intenso en cada gota. Castaña, lavanda y vainilla crean una calidez envolvente, moderna y romántica.",
      notas: ["Castaña", "Lavanda", "Vainilla", "Madera"]

  ];

  const MAKI_WPP = "5492236247791";
  const seleccion = {};
  const carrito = [];
  let detailProductId = null;
  let detailMLSeleccionado = null;

  // ── CATÁLOGO ───────────────────────────────────────────────
  function renderCatalogo() {
    const grid = document.getElementById("catalogGrid");
    grid.innerHTML = "";
    productos.forEach(p => {
      const mls = Object.keys(p.precios);
      if (!seleccion[p.id]) seleccion[p.id] = mls[0];
      const precio = p.precios[seleccion[p.id]];
      const mlBtns = mls.map(ml => `
        <button class="ml-btn ${seleccion[p.id] === ml ? 'selected' : ''}"
          onclick="selectML(${p.id}, '${ml}')">${ml}</button>
      `).join("");

      const card = document.createElement("div");
      card.className = "product-card";
      card.id = `card-${p.id}`;
      card.innerHTML = `
        <div class="product-img-wrap" onclick="openDetail(${p.id})">
          <img src="${p.img}" alt="${p.nombre}" />
          <span class="lupa">🔍</span>
        </div>
        <div class="product-info">
          <div class="product-name">${p.nombre}</div>
          <div class="product-brand">${p.marca}</div>
          <div class="ml-selector">${mlBtns}</div>
          <div class="product-price" id="price-${p.id}">$${precio.toLocaleString("es-AR")}</div>
          <button class="add-btn" onclick="agregarAlCarrito(${p.id})">+ Agregar</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function selectML(id, ml) {
    seleccion[id] = ml;
    document.querySelectorAll(`#card-${id} .ml-btn`).forEach(btn => {
      btn.classList.toggle("selected", btn.textContent === ml);
    });
    const p = productos.find(x => x.id === id);
    document.getElementById(`price-${id}`).textContent = "$" + p.precios[ml].toLocaleString("es-AR");
  }

  // ── DETALLE ────────────────────────────────────────────────
  function openDetail(id) {
    const p = productos.find(x => x.id === id);
    detailProductId = id;
    const mls = Object.keys(p.precios);
    detailMLSeleccionado = seleccion[id] || mls[0];

    document.getElementById("detailImg").src = p.img;
    document.getElementById("detailImg").alt = p.nombre;
    document.getElementById("detailNombre").textContent = p.nombre;
    document.getElementById("detailMarca").textContent = p.marca;
    document.getElementById("detailDesc").textContent = p.desc;
    document.getElementById("detailNotas").innerHTML = p.notas.map(n =>
      `<span class="nota-tag">${n}</span>`
    ).join("");

    document.getElementById("detailPrecios").innerHTML = mls.map(ml => `
      <div class="detail-precio-item ${detailMLSeleccionado === ml ? 'selected' : ''}"
        onclick="selectDetailML('${ml}')">
        <div class="detail-precio-ml">${ml}</div>
        <div class="detail-precio-val">$${p.precios[ml].toLocaleString("es-AR")}</div>
      </div>
    `).join("");

    document.getElementById("detailModal").classList.add("open");
  }

  function selectDetailML(ml) {
    detailMLSeleccionado = ml;
    document.querySelectorAll(".detail-precio-item").forEach(el => {
      el.classList.toggle("selected", el.querySelector(".detail-precio-ml").textContent === ml);
    });
  }

  function closeDetail() {
    document.getElementById("detailModal").classList.remove("open");
  }

  function agregarDesdeDetalle() {
    const p = productos.find(x => x.id === detailProductId);
    carrito.push({ id: p.id, nombre: p.nombre, marca: p.marca, ml: detailMLSeleccionado, precio: p.precios[detailMLSeleccionado] });
    actualizarFAB();
    closeDetail();
    const btn = document.querySelector(`#card-${p.id} .add-btn`);
    if (btn) { btn.textContent = "✓ Agregado"; btn.style.background = "#2a7a2a"; setTimeout(() => { btn.textContent = "+ Agregar"; btn.style.background = ""; }, 1200); }
  }

  // ── CARRITO ────────────────────────────────────────────────
  function agregarAlCarrito(id) {
    const p = productos.find(x => x.id === id);
    const ml = seleccion[id];
    carrito.push({ id, nombre: p.nombre, marca: p.marca, ml, precio: p.precios[ml] });
    actualizarFAB();
    const btn = document.querySelector(`#card-${id} .add-btn`);
    btn.textContent = "✓ Agregado";
    btn.style.background = "#2a7a2a";
    setTimeout(() => { btn.textContent = "+ Agregar"; btn.style.background = ""; }, 1200);
  }

  function eliminarItem(i) {
    carrito.splice(i, 1);
    actualizarFAB();
    renderCartItems();
  }

  function actualizarFAB() {
    document.getElementById("cartCount").textContent = carrito.length;
    document.getElementById("cartFab").classList.toggle("visible", carrito.length > 0);
  }

  function openCart()  { document.getElementById("cartModal").classList.add("open"); renderCartItems(); }
  function closeCart() { document.getElementById("cartModal").classList.remove("open"); }

  function renderCartItems() {
    const container = document.getElementById("cartItems");
    const totalEl = document.getElementById("cartTotal");
    if (carrito.length === 0) {
      container.innerHTML = `<p style="color:#666;text-align:center;padding:20px 0;">Carrito vacío</p>`;
      totalEl.textContent = "$0";
      return;
    }
    container.innerHTML = carrito.map((item, i) => `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.nombre}</div>
          <div class="cart-item-detail">${item.marca} · ${item.ml}</div>
        </div>
        <div class="cart-item-price">$${item.precio.toLocaleString("es-AR")}</div>
        <button class="cart-item-remove" onclick="eliminarItem(${i})">✕</button>
      </div>
    `).join("");
    totalEl.textContent = "$" + carrito.reduce((s, x) => s + x.precio, 0).toLocaleString("es-AR");
  }

  // ── ENVIAR ─────────────────────────────────────────────────
  function enviarPedido() {
    if (carrito.length === 0) { alert("Agregá al menos un producto."); return; }
    const nombre    = document.getElementById("fNombre").value.trim();
    const apellido  = document.getElementById("fApellido").value.trim();
    const ciudad    = document.getElementById("fCiudad").value.trim();
    const direccion = document.getElementById("fDireccion").value.trim();
    const wpp       = document.getElementById("fWpp").value.trim();
    if (!nombre || !apellido || !ciudad || !direccion || !wpp) {
      alert("Completá todos los campos antes de enviar."); return;
    }
    const total = carrito.reduce((s, x) => s + x.precio, 0);
    const lineas = carrito.map(item =>
      `• ${item.nombre} (${item.marca}) · ${item.ml} — $${item.precio.toLocaleString("es-AR")}`
    ).join("\n");
    const msg = [
      "🌟 *NUEVO PEDIDO — THE NICE SHOT*", "",
      `👤 *Cliente:* ${nombre} ${apellido}`,
      `📍 *Ciudad:* ${ciudad}`,
      `🏠 *Dirección:* ${direccion}`,
      `📱 *WhatsApp:* ${wpp}`, "",
      "🛒 *Productos:*", lineas, "",
      `💰 *Total: $${total.toLocaleString("es-AR")}*`,
    ].join("\n");
    window.open(`https://wa.me/${MAKI_WPP}?text=${encodeURIComponent(msg)}`, "_blank");
  }

  renderCatalogo();
</script>
